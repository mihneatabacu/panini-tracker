<style>
:root{--bg:#080810;--card:#10101c;--border:#1a1a28;--gold:#D4AF37;--teal:#4ECDC4;--orange:#FF6B35;--green:#22c55e;--red:#ef4444;--text:#fff;--muted:#888;--dim:#444}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:'Oswald',sans-serif;letter-spacing:1px}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none}
button:active{transform:scale(.97)}
input{font-family:'DM Sans',sans-serif;outline:none}
input::placeholder{color:var(--dim)}
::-webkit-scrollbar{width:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.fadeUp{animation:fadeUp .35s ease}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--teal);color:#000;padding:10px 22px;border-radius:20px;font-weight:700;font-size:13px;z-index:999;box-shadow:0 4px 20px #4ECDC444;animation:fadeUp .25s ease;max-width:90%;text-align:center;pointer-events:none}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 6px}
.hdr-title{font-size:20px}
.hdr-pct{font-family:'Oswald',sans-serif;font-size:26px;color:var(--gold);font-weight:700;line-height:1}
.prog{height:2px;background:#ffffff06;margin:0 16px 4px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--teal));transition:width .4s;border-radius:1px}
.add-row{display:flex;gap:8px;padding:8px 16px}
.add-in{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:#fff;padding:10px 14px;font-size:14px}
.add-btn{background:var(--gold);color:#000;border-radius:10px;padding:10px 18px;font-weight:700;font-size:14px;white-space:nowrap}
.nav{display:flex;background:#0a0a14;border-top:1px solid #ffffff06;border-bottom:1px solid #ffffff06;position:sticky;top:0;z-index:50}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px;background:none;color:var(--dim);font-size:10px;border-bottom:2px solid transparent;position:relative}
.nav-btn.on{color:var(--gold);border-bottom-color:var(--gold)}
.nav-badge{position:absolute;top:2px;right:calc(50% - 20px);background:var(--red);color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:8px;min-width:14px;text-align:center}
.nav-ico{font-size:17px}
.body{padding:12px 16px;padding-bottom:32px}
.sec{font-size:18px;margin:0 0 8px}
.card{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:12px}
.action-btn{width:100%;background:#D4AF3712;border:1px solid #D4AF3728;color:var(--gold);padding:11px;border-radius:10px;font-size:13px;font-weight:600;margin-top:8px}
.empty-card{background:var(--card);border-radius:14px;padding:28px 20px;border:1px solid var(--border);text-align:center;margin-bottom:12px}
.empty-title{font-family:'Oswald',sans-serif;font-size:17px;margin:0 0 6px;letter-spacing:1px}
.empty-desc{color:var(--muted);font-size:13px;margin:0 0 16px;line-height:1.5}
.trade-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.trade-friend{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.avatar{width:36px;height:36px;border-radius:50%;background:#1e1e32;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;flex-shrink:0}
.trade-name{font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:1px}
.trade-label{font-size:12px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.chip-wrap{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:11px;font-weight:600;padding:3px 7px;border-radius:6px;border:1px solid}
.chip-green{background:#22c55e12;border-color:#22c55e33;color:var(--green)}
.chip-orange{background:#f9731612;border-color:#f9731633;color:var(--orange)}
.trade-footer{margin-top:10px;padding-top:8px;border-top:1px solid #ffffff0a;color:var(--gold);font-size:13px;font-weight:600}
.grp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.grp-card{background:var(--card);border:none;border-left:3px solid var(--gold);border-radius:10px;padding:10px 12px;text-align:left;width:100%}
.team-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.team-card{background:var(--card);border:none;border-left:3px solid;border-radius:10px;padding:8px 10px;text-align:left;width:100%}
.team-bar{height:2px;background:#ffffff08;border-radius:1px;margin-top:4px}
.team-bar-fill{height:100%;border-radius:1px;transition:width .3s}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.f-btn{background:var(--card);border:1px solid var(--border);color:#666;padding:5px 12px;border-radius:8px;font-size:12px}
.f-btn.on{background:#D4AF3715;border-color:#D4AF3740;color:var(--gold)}
.sticker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.sticker{border-radius:10px;padding:8px 4px;text-align:center;border:1.5px solid;transition:all .15s;position:relative}
.s-btn{width:28px;height:28px;border-radius:8px;background:#ffffff08;border:none;color:#888;font-size:15px;display:flex;align-items:center;justify-content:center;font-weight:700}
.sync-btn{background:#ffffff08;border:1px solid #ffffff12;color:var(--muted);border-radius:8px;padding:5px 12px;font-size:13px}
.on-input{width:100%;background:var(--card);border:2px solid var(--border);border-radius:12px;color:#fff;padding:14px 18px;font-size:16px;margin-bottom:12px}
.big-btn{width:100%;background:var(--gold);color:#000;border-radius:12px;padding:14px;font-size:15px;font-weight:700;margin-bottom:10px}
.ghost-btn{background:none;color:#666;font-size:13px;padding:10px}
.room-in{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:#fff;padding:10px 12px;font-size:14px;letter-spacing:2px;text-transform:uppercase}
.member-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #ffffff06}
.member-row:last-child{border-bottom:none}
.room-code{font-family:'Oswald',sans-serif;font-size:30px;color:var(--teal);letter-spacing:3px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{background:#0c0c16;border-radius:10px;padding:14px 10px;text-align:center}
.stat-num{font-family:'Oswald',sans-serif;font-size:28px}
.loading{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
.loading-ball{font-size:56px;animation:pulse 1.2s ease infinite}

// Build all sticker codes
const FWC_CODES = ["00","FWC1","FWC2","FWC3","FWC4","FWC5","FWC6","FWC7","FWC8",
  "FWC9","FWC10","FWC11","FWC12","FWC13","FWC14","FWC15","FWC16","FWC17","FWC18","FWC19"];
const FWC_NAMES = {
  "00":"Panini Logo","FWC1":"Official Emblem","FWC2":"Official Emblem","FWC3":"Official Mascots",
  "FWC4":"Official Slogan","FWC5":"Official Ball","FWC6":"Canada","FWC7":"Mexico","FWC8":"USA",
  "FWC9":"Italy 1934","FWC10":"Uruguay 1950","FWC11":"W.Germany 1954","FWC12":"Brazil 1962",
  "FWC13":"W.Germany 1974","FWC14":"Argentina 1986","FWC15":"Brazil 1994","FWC16":"Brazil 2002",
  "FWC17":"Italy 2006","FWC18":"Germany 2014","FWC19":"Argentina 2022"
};

const ALL_CODES = [];
FWC_CODES.forEach(c => ALL_CODES.push(c));
const TEAM_ORDER = [];
GROUPS.forEach(g => g.teams.forEach(t => { TEAM_ORDER.push(t); for(let i=1;i<=20;i++) ALL_CODES.push(t+i); }));

const TOTAL = ALL_CODES.length; // 980

function teamForCode(code) {
  const m = code.match(/^([A-Z]{2,3})\d+$/);
  return m ? m[1] : null;
}
function groupForTeam(tc) {
  const g = GROUPS.find(g => g.teams.includes(tc));
  return g ? g.id : null;
}

// ── HELPERS ──
function simpleHash(str){let h=0;for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0}return"r"+(h>>>0).toString(36)}
function makeUID(){const c="abcdefghijklmnopqrstuvwxyz0123456789";let r="";for(let i=0;i<8;i++)r+=c[Math.floor(Math.random()*c.length)];return r}

// ── STORAGE ──
// profile: { name, room (display code), roomKey (hashed path), uid (unique per device) }
let state = {
  profile:null, stickers:{}, members:{}, page:"feed", selGroup:null, selTeam:null,
  filter:"all", loading:true, setupStep:0, toast:"", justAdded:[], unsubscribe:null,
  authed:false
};

function saveLocal(){try{localStorage.setItem("pn-profile",JSON.stringify(state.profile));localStorage.setItem("pn-stickers",JSON.stringify(state.stickers))}catch{}}
function loadLocal(){try{const p=localStorage.getItem("pn-profile");const s=localStorage.getItem("pn-stickers");if(p)state.profile=JSON.parse(p);if(s)state.stickers=JSON.parse(s)}catch{}}

async function saveToFirestore(){
  if(!state.profile?.roomKey||!state.profile?.uid)return;
  try{await db.collection("rooms").doc(state.profile.roomKey).collection("members").doc(state.profile.uid)
    .set({name:state.profile.name,stickers:state.stickers,updatedAt:firebase.firestore.FieldValue.serverTimestamp()})}catch(e){console.warn("Save error:",e)}
}
function listenToRoom(){
  if(state.unsubscribe){state.unsubscribe();state.unsubscribe=null}
  if(!state.profile?.roomKey)return;
  state.unsubscribe=db.collection("rooms").doc(state.profile.roomKey).collection("members")
    .onSnapshot(snap=>{
      const m={};snap.forEach(doc=>{
        if(doc.id===state.profile.uid)return;
        const d=doc.data();if(d.stickers)m[d.name||doc.id]=d.stickers;
      });
      state.members=m;render();
    },err=>console.warn("Listen error:",err));
}

let toastTimer=null;
function flash(msg){state.toast=msg;render();clearTimeout(toastTimer);toastTimer=setTimeout(()=>{state.toast="";render()},2800)}

// ── STICKER OPS ──
function addSticker(code){state.stickers[code]=(state.stickers[code]||0)+1;saveLocal();saveToFirestore();render()}
function removeSticker(code){if(!state.stickers[code])return;state.stickers[code]--;if(state.stickers[code]<=0)delete state.stickers[code];saveLocal();saveToFirestore();render()}

function quickAdd(){
  const el=document.getElementById("quick-input");if(!el)return;
  const raw=el.value.toUpperCase().trim();
  if(!raw){flash("Enter sticker codes");return}
  // Parse codes: "MEX5 BRA14 FWC3" or "MEX5, BRA14, FWC3" or "MEX 5 14 17" (team + numbers)
  const codes=[];
  const parts=raw.split(/[\s,;]+/);
  let currentTeam=null;
  parts.forEach(p=>{
    // Check if it's a full code like MEX5 or FWC12
    if(ALL_CODES.includes(p)){codes.push(p);currentTeam=teamForCode(p);return}
    // Check if it's just a team code
    if(TEAMS[p]||p==="FWC"||p==="00"){currentTeam=p;return}
    // Check if it's a number and we have a current team
    const n=parseInt(p);
    if(!isNaN(n)&&currentTeam){
      const c=currentTeam==="00"?"00":currentTeam+n;
      if(ALL_CODES.includes(c))codes.push(c);
    }
  });
  if(!codes.length){flash("No valid codes found. Try: MEX5, BRA14");return}
  codes.forEach(c=>{state.stickers[c]=(state.stickers[c]||0)+1});
  el.value="";saveLocal();saveToFirestore();
  state.justAdded=codes;render();
  setTimeout(()=>{state.justAdded=[];render()},4000);
  flash(`+${codes.length} sticker${codes.length>1?"s":""}`);
}

// ── SETUP ──
async function finishSetup(room){
  const name=state.tempName||"";if(!name)return;
  const pin=state.tempPin||"";if(!pin){flash("Enter a PIN");return}
  const uid=simpleHash(name.toLowerCase()+"::"+pin); // same name+PIN = same account on any device
  state.profile={name,room:room||null,roomKey:room||null,uid,pin};
  state.setupStep=0;saveLocal();
  if(room){await saveToFirestore();listenToRoom()}
  flash(`Welcome ${name}!`);render();
}
async function joinRoom(code){
  if(!code){flash("Enter a room code");return}
  code=code.trim().toUpperCase();
  state.profile.room=code;
  state.profile.roomKey=code;
  saveLocal();await saveToFirestore();listenToRoom();
  flash(`Joined ${code}!`);render();
}
async function leaveRoom(){
  if(!state.profile?.roomKey)return;
  try{await db.collection("rooms").doc(state.profile.roomKey).collection("members").doc(state.profile.uid).delete()}catch{}
  if(state.unsubscribe){state.unsubscribe();state.unsubscribe=null}
  state.profile.room=null;state.profile.roomKey=null;
  state.members={};saveLocal();render();flash("Left room");
}

// ── COMPUTED ──
function getStats(){
  const owned=Object.keys(state.stickers).length;
  const dupes=Object.values(state.stickers).reduce((s,v)=>s+Math.max(0,v-1),0);
  return{owned,missing:TOTAL-owned,dupes,pct:Math.round((owned/TOTAL)*100)};
}
function getTeamStats(tc){
  let owned=0,dupes=0;
  for(let i=1;i<=20;i++){const c=tc+i;if(state.stickers[c]){owned++;dupes+=state.stickers[c]-1}}
  return{owned,total:20,dupes};
}
function getGroupStats(gid){
  const g=GROUPS.find(x=>x.id===gid);if(!g)return{owned:0,total:80,dupes:0};
  let owned=0,dupes=0;
  g.teams.forEach(tc=>{const s=getTeamStats(tc);owned+=s.owned;dupes+=s.dupes});
  return{owned,total:80,dupes};
}
function getFWCStats(){
  let owned=0,dupes=0;
  FWC_CODES.forEach(c=>{if(state.stickers[c]){owned++;dupes+=state.stickers[c]-1}});
  return{owned,total:FWC_CODES.length,dupes};
}
function getTradeFeed(){
  const feed=[];
  Object.entries(state.members).forEach(([name,ms])=>{
    const theyGive=[],youGive=[];
    ALL_CODES.forEach(c=>{
      const mine=state.stickers[c]||0;const theirs=ms[c]||0;
      if(theirs>1&&mine===0)theyGive.push(c);
      if(mine>1&&theirs===0)youGive.push(c);
    });
    if(theyGive.length||youGive.length)
      feed.push({name,theyGive,youGive,fairTrades:Math.min(theyGive.length,youGive.length)});
  });
  feed.sort((a,b)=>b.fairTrades-a.fairTrades);return feed;
}
async function shareText(type){
  const p=state.profile;const stats=getStats();
  let t=`⚽ Panini WC 2026 — ${p?.name}\n`;
  if(type==="dupes"){
    const d=[];ALL_CODES.forEach(c=>{if((state.stickers[c]||0)>1)d.push(c+"×"+(state.stickers[c]-1))});
    t+=`\n🔄 Dupes (${stats.dupes}):\n${d.join(", ")||"None"}`;
  }else if(type==="missing"){
    const m=ALL_CODES.filter(c=>!state.stickers[c]);
    t+=`\n❌ Need (${stats.missing}):\n${m.join(", ")||"Complete!"}`;
  }else{
    t+=`✅ ${stats.owned}/${TOTAL} (${stats.pct}%)\n🔄 ${stats.dupes} dupes | ❌ ${stats.missing} missing`;
    if(p?.room)t+=`\n🏠 Room: ${p.room}`;
  }
  if(navigator.share){try{await navigator.share({text:t});return}catch{}}
  try{await navigator.clipboard.writeText(t);flash("Copied!")}catch{}
}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}

// ══════════════════════════
// RENDER
// ══════════════════════════
function render(){
  const app=document.getElementById("app");

  if(state.loading){app.innerHTML=`<div class="loading"><div class="loading-ball">⚽</div></div>`;return}

  // PASSWORD GATE
  if(!state.authed){
    app.innerHTML=`
      <div style="text-align:center;padding:120px 28px 40px">
        <div style="font-size:48px;margin-bottom:8px">🔒</div>
        <h1 style="font-family:'Oswald',sans-serif;font-size:32px;letter-spacing:2px;margin-bottom:4px">PANINI 2026</h1>
        <p style="color:var(--muted);font-size:13px;margin-bottom:32px">Enter the password to continue</p>
        <input class="on-input" id="master-pwd" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')document.getElementById('pwd-btn').click()">
        <button class="big-btn" id="pwd-btn" onclick="
          var v=document.getElementById('master-pwd').value;
          if(v===MASTER_PASSWORD){state.authed=true;try{localStorage.setItem('pn-auth','1')}catch{};render()}
          else{flash('Wrong password')}
        ">Enter</button>
      </div>`;
    return;
  }

  // ONBOARDING
  if(!state.profile){
    app.innerHTML=`
      <div style="text-align:center;padding:80px 28px 40px">
        <div style="font-size:64px;margin-bottom:4px">⚽</div>
        <h1 style="font-family:'Oswald',sans-serif;font-size:48px;letter-spacing:3px;line-height:1">PANINI<span style="display:block;color:var(--gold);font-size:36px">WC 2026</span></h1>
        <p style="color:var(--muted);font-size:13px;margin:8px 0 36px;line-height:1.5">980 stickers · 48 teams · 12 groups<br>Track. Trade. Complete.</p>
        ${state.setupStep===0?`<div class="fadeUp">
          <input class="on-input" id="name-input" placeholder="Your name" maxlength="20">
          <input class="on-input" id="pin-input" placeholder="Pick a 4-digit PIN" maxlength="6" inputmode="numeric" style="letter-spacing:4px;text-align:center">
          <p style="color:#555;font-size:11px;margin-bottom:16px">Use the same name + PIN on any device to sync your collection</p>
          <button class="big-btn" id="next-btn" onclick="var n=document.getElementById('name-input').value.trim();var p=document.getElementById('pin-input').value.trim();if(n&&p){state.tempName=n;state.tempPin=p;state.setupStep=1;render()}else{flash('Enter name and PIN')}">Next →</button>
        </div>`:state.setupStep===1?`<div class="fadeUp">
          <p style="color:#aaa;font-size:14px;margin-bottom:20px">Want to trade stickers with friends?</p>
          <button class="big-btn" onclick="state.setupStep=2;render()">🏠 Create a room</button>
          <button class="big-btn" style="background:var(--card);color:#fff;border:1px solid var(--border)" onclick="state.setupStep=3;render()">🔑 Join a friend's room</button>
          <button class="ghost-btn" onclick="finishSetup(null)">Skip for now</button>
        </div>`:state.setupStep===2?`<div class="fadeUp">
          <p style="color:#aaa;font-size:14px;margin-bottom:10px">Pick a room code to share with friends:</p>
          <input class="on-input" id="room-create-input" placeholder="e.g. SQUAD99" maxlength="12" style="text-transform:uppercase;letter-spacing:2px" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
          <button class="big-btn" onclick="var c=document.getElementById('room-create-input').value.trim();if(c)finishSetup(c)">Create room</button>
          <button class="ghost-btn" onclick="state.setupStep=1;render()">← Back</button>
        </div>`:`<div class="fadeUp">
          <p style="color:#aaa;font-size:14px;margin-bottom:10px">Enter your friend's room code:</p>
          <input class="on-input" id="room-join-input" placeholder="Room code" maxlength="12" style="text-transform:uppercase;letter-spacing:2px" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
          <button class="big-btn" onclick="var c=document.getElementById('room-join-input').value.trim();if(c)finishSetup(c)">Join</button>
          <button class="ghost-btn" onclick="state.setupStep=1;render()">← Back</button>
        </div>`}
      </div>`;
    return;
  }

  const stats=getStats();
  const tradeFeed=getTradeFeed();
  const totalAlerts=tradeFeed.reduce((s,t)=>s+t.theyGive.length+t.youGive.length,0);
  let content="";

  // ═══ FEED ═══
  if(state.page==="feed"){
    const rm=state.profile.room;const mc=Object.keys(state.members).length;
    if(!rm)content=`<div class="empty-card"><div style="font-size:40px;margin-bottom:8px">👥</div><p class="empty-title">Join a room to trade!</p><p class="empty-desc">Create a room and share the code with friends.</p><button class="action-btn" onclick="state.page='room';render()">Set up a room</button></div>`;
    else if(!mc)content=`<div class="empty-card"><div style="font-size:40px;margin-bottom:8px">📡</div><p class="empty-title">Waiting for friends…</p><p class="empty-desc">Share code <strong style="color:var(--teal);letter-spacing:2px">${rm}</strong> with friends.</p><button class="action-btn" onclick="shareText('room')">📤 Invite friends</button></div>`;
    else if(!tradeFeed.length)content=`<div class="empty-card"><div style="font-size:40px;margin-bottom:8px">📭</div><p class="empty-title">No trades yet</p><p class="empty-desc">Keep collecting! Matches appear in real time.</p></div>`;
    else content=tradeFeed.map(t=>`<div class="trade-card fadeUp">
      <div class="trade-friend"><div class="avatar">${t.name[0].toUpperCase()}</div><div><div class="trade-name">${esc(t.name)}</div><div style="font-size:11px;color:var(--muted)">${t.fairTrades} fair trade${t.fairTrades!==1?"s":""}</div></div></div>
      ${t.theyGive.length?`<div style="margin-bottom:10px"><div class="trade-label" style="color:var(--green)"><span style="width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block"></span>${esc(t.name)} has ${t.theyGive.length} you need</div><div class="chip-wrap">${t.theyGive.slice(0,40).map(c=>`<span class="chip chip-green">${c}</span>`).join("")}${t.theyGive.length>40?`<span style="color:#666;font-size:11px;padding:4px">+${t.theyGive.length-40}</span>`:""}</div></div>`:""}
      ${t.youGive.length?`<div style="margin-bottom:10px"><div class="trade-label" style="color:var(--orange)"><span style="width:6px;height:6px;border-radius:50%;background:var(--orange);display:inline-block"></span>You have ${t.youGive.length} ${esc(t.name)} needs</div><div class="chip-wrap">${t.youGive.slice(0,40).map(c=>`<span class="chip chip-orange">${c}</span>`).join("")}${t.youGive.length>40?`<span style="color:#666;font-size:11px;padding:4px">+${t.youGive.length-40}</span>`:""}</div></div>`:""}
      <div class="trade-footer">✅ ${t.fairTrades} possible trade${t.fairTrades!==1?"s":""}</div></div>`).join("");
    content=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 class="sec">🔔 Trade Updates</h2>${rm?`<span style="font-size:10px;color:var(--green)">● Live</span>`:""}</div>${content}`;
  }

  // ═══ ALBUM ═══
  else if(state.page==="album"&&!state.selGroup&&!state.selTeam){
    // FWC section
    const fs=getFWCStats();const fpct=Math.round((fs.owned/fs.total)*100);
    content=`<h2 class="sec">📋 Album</h2>
      <button class="grp-card" style="width:100%;margin-bottom:12px;border-left-color:var(--gold)" onclick="state.selGroup='FWC';render()">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><span style="font-size:18px">🏆</span> <span style="font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px">FIFA World Cup</span></div>
          <span style="color:var(--muted);font-size:12px">${fs.owned}/${fs.total}</span>
        </div>
        <div class="team-bar"><div class="team-bar-fill" style="width:${fpct}%;background:${fpct===100?"var(--teal)":"var(--gold)"}"></div></div>
      </button>
      <div class="grp-grid">${GROUPS.map(g=>{
        const gs=getGroupStats(g.id);const pct=Math.round((gs.owned/gs.total)*100);
        return`<button class="grp-card" onclick="state.selGroup='${g.id}';render()">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:var(--gold)">Group ${g.id}</span>
            ${gs.dupes?`<span style="color:var(--teal);font-size:9px;background:#4ECDC418;padding:1px 5px;border-radius:4px;font-weight:700">${gs.dupes}d</span>`:""}
          </div>
          <div style="font-size:16px;margin-bottom:6px">${g.teams.map(t=>TEAMS[t].flag).join(" ")}</div>
          <div class="team-bar"><div class="team-bar-fill" style="width:${pct}%;background:${pct===100?"var(--teal)":"var(--gold)"}"></div></div>
          <div style="font-size:10px;color:#555;margin-top:3px">${gs.owned}/80</div>
        </button>`;
      }).join("")}</div>`;
  }

  // ═══ GROUP DETAIL ═══
  else if(state.page==="album"&&state.selGroup&&!state.selTeam){
    if(state.selGroup==="FWC"){
      // FWC stickers
      content=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <button class="s-btn" style="width:32px;height:32px;border:1px solid #ffffff18;color:#fff" onclick="state.selGroup=null;render()">←</button>
        <span style="font-size:26px">🏆</span><div><div style="font-family:'Oswald',sans-serif;font-size:18px;font-weight:700">FIFA World Cup</div><div style="color:#666;font-size:11px">Intro & Museum</div></div>
      </div>
      <div class="sticker-grid">${FWC_CODES.map(c=>{
        const cnt=state.stickers[c]||0;const has=cnt>0;
        return`<div class="sticker" style="background:${has?"#D4AF3715":"#0c0c16"};border-color:${has?"#D4AF3744":"#1a1a28"}">
          <div style="font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;color:${has?"#fff":"#333"}">${c}</div>
          <div style="font-size:9px;color:${has?"#D4AF37":"#333"};margin:2px 0">${FWC_NAMES[c]||""}</div>
          ${cnt>1?`<div style="color:var(--teal);font-size:10px;font-weight:700">x${cnt}</div>`:""}
          <div style="display:flex;gap:4px;justify-content:center;margin-top:4px">
            <button class="s-btn" onclick="removeSticker('${c}')">−</button>
            <button class="s-btn" style="background:#D4AF3730;color:var(--gold)" onclick="addSticker('${c}')">+</button>
          </div>
        </div>`;
      }).join("")}</div>`;
    } else {
      const g=GROUPS.find(x=>x.id===state.selGroup);
      if(g){
        content=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <button class="s-btn" style="width:32px;height:32px;border:1px solid #ffffff18;color:#fff" onclick="state.selGroup=null;render()">←</button>
          <div><div style="font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--gold)">Group ${g.id}</div></div>
        </div>
        <div class="team-grid">${g.teams.map(tc=>{
          const t=TEAMS[tc];const ts=getTeamStats(tc);const pct=Math.round((ts.owned/ts.total)*100);
          return`<button class="team-card" style="border-left-color:${t.color}" onclick="state.selTeam='${tc}';state.filter='all';render()">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:22px">${t.flag}</span>
              ${pct===100?`<span style="color:var(--teal);font-weight:700">✓</span>`:ts.dupes?`<span style="color:var(--teal);font-size:9px;background:#4ECDC418;padding:1px 5px;border-radius:4px;font-weight:700">${ts.dupes}d</span>`:""}
            </div>
            <div style="font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;margin:4px 0">${t.name}</div>
            <div class="team-bar"><div class="team-bar-fill" style="width:${pct}%;background:${pct===100?"var(--teal)":t.color}"></div></div>
            <div style="font-size:10px;color:#555;margin-top:3px">${ts.owned}/20</div>
          </button>`;
        }).join("")}</div>`;
      }
    }
  }

  // ═══ TEAM DETAIL ═══
  else if(state.page==="album"&&state.selTeam){
    const tc=state.selTeam;const t=TEAMS[tc];
    if(t){
      const codes=[];for(let i=1;i<=20;i++)codes.push(tc+i);
      const filtered=codes.filter(c=>{
        const cnt=state.stickers[c]||0;
        if(state.filter==="owned")return cnt>0;if(state.filter==="missing")return cnt===0;if(state.filter==="dupes")return cnt>1;return true;
      });
      content=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <button class="s-btn" style="width:32px;height:32px;border:1px solid #ffffff18;color:#fff" onclick="state.selTeam=null;render()">←</button>
        <span style="font-size:28px">${t.flag}</span>
        <div><div style="font-family:'Oswald',sans-serif;font-size:18px;font-weight:700">${t.name}</div>
        <div style="color:#666;font-size:11px">Group ${groupForTeam(tc)} · ${tc}1–${tc}20</div></div>
      </div>
      <div class="filter-row">${[["all","All"],["owned","Have"],["missing","Need"],["dupes","Dupes"]].map(([k,l])=>
        `<button class="f-btn${state.filter===k?" on":""}" onclick="state.filter='${k}';render()">${l}</button>`).join("")}
      </div>
      <div class="sticker-grid">${filtered.map(c=>{
        const cnt=state.stickers[c]||0;const has=cnt>0;const num=c.replace(tc,"");
        let friendHas=false,friendNeeds=false;
        Object.values(state.members).forEach(ms=>{if(!cnt&&ms[c]>1)friendHas=true;if(cnt>1&&!ms[c])friendNeeds=true});
        return`<div class="sticker" style="background:${has?t.color+"15":"#0c0c16"};border-color:${has?t.color+"44":"#1a1a28"}">
          ${friendHas&&!has?`<div style="position:absolute;top:2px;right:4px;font-size:8px;color:var(--green)">●</div>`:""}
          ${friendNeeds&&cnt>1?`<div style="position:absolute;top:2px;right:4px;font-size:8px;color:var(--orange)">●</div>`:""}
          <div style="font-family:'Oswald',sans-serif;font-size:12px;color:${has?"#fff":"#333"};font-weight:700">${c}</div>
          ${cnt>1?`<div style="color:var(--teal);font-size:10px;font-weight:700">x${cnt}</div>`:""}
          <div style="display:flex;gap:4px;justify-content:center;margin-top:4px">
            <button class="s-btn" onclick="removeSticker('${c}')">−</button>
            <button class="s-btn" style="background:${t.color}30;color:${t.color}" onclick="addSticker('${c}')">+</button>
          </div>
        </div>`;
      }).join("")}</div>
      <div style="display:flex;gap:8px;margin-top:14px;font-size:10px;color:#555;justify-content:center">
        <span><span style="color:var(--green)">●</span> Friend has it</span>
        <span><span style="color:var(--orange)">●</span> Friend needs yours</span>
      </div>`;
    }
  }

  // ═══ ROOM ═══
  else if(state.page==="room"){
    if(state.profile.room){
      const mc=Object.keys(state.members).length;
      content=`<h2 class="sec">👥 Room</h2><div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div style="color:#666;font-size:10px;text-transform:uppercase;letter-spacing:1px">Room Code</div><div class="room-code">${state.profile.room}</div></div>
          <span style="color:var(--green);font-size:11px">● Live</span>
        </div>
        <div style="margin-top:16px"><div style="color:#666;font-size:10px;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Members (${mc+1})</div>
        <div class="card" style="padding:0;background:#0c0c16">
          <div class="member-row"><div class="avatar" style="width:28px;height:28px;font-size:12px;background:#D4AF3730;color:var(--gold)">${state.profile.name[0].toUpperCase()}</div><span style="flex:1">${esc(state.profile.name)} <span style="color:#555">(you)</span></span><span style="color:var(--teal);font-size:12px">${stats.owned}/${TOTAL}</span></div>
          ${Object.entries(state.members).map(([name,ms])=>`<div class="member-row"><div class="avatar" style="width:28px;height:28px;font-size:12px">${name[0].toUpperCase()}</div><span style="flex:1">${esc(name)}</span><span style="color:var(--muted);font-size:12px">${Object.keys(ms).length}/${TOTAL}</span></div>`).join("")}
        </div></div></div>
        <button class="action-btn" onclick="var t='Join my Panini WC 2026 room!\\nCode: ${state.profile.room}\\nOpen the tracker and enter this code 👆';if(navigator.share){navigator.share({text:t}).catch(function(){navigator.clipboard.writeText(t).then(function(){flash('Copied!')})})}else{navigator.clipboard.writeText(t).then(function(){flash('Copied!')})}">📤 Invite friends</button>
        <button class="action-btn" style="background:#ff444415;color:#ff6666;border-color:#ff444430" onclick="leaveRoom()">Leave room</button>`;
    }else{
      content=`<h2 class="sec">👥 Room</h2><div class="card">
        <p style="color:#aaa;font-size:14px;margin:0 0 16px;line-height:1.5">Join a room with friends for <strong style="color:var(--teal)">real-time</strong> trade matching.</p>
        <div style="margin-bottom:16px"><div style="color:#666;font-size:10px;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Create new room</div>
        <div style="display:flex;gap:8px"><input class="room-in" id="room-create" placeholder="e.g. SQUAD99" maxlength="12" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"><button class="add-btn" onclick="var c=document.getElementById('room-create').value.trim();if(c)joinRoom(c)">Create</button></div></div>
        <div><div style="color:#666;font-size:10px;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Join existing</div>
        <div style="display:flex;gap:8px"><input class="room-in" id="room-join" placeholder="Enter code" maxlength="12" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"><button class="add-btn" onclick="var c=document.getElementById('room-join').value.trim();if(c)joinRoom(c)">Join</button></div></div></div>`;
    }
  }

  // ═══ MORE ═══
  else if(state.page==="more"){
    content=`<h2 class="sec">⚙️ More</h2>
      <div class="card"><div style="color:#666;font-size:10px;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">Share with friends</div>
        <button class="action-btn" style="margin-top:0" onclick="shareText('summary')">📊 Summary</button>
        <button class="action-btn" onclick="shareText('dupes')">🔄 Duplicates</button>
        <button class="action-btn" onclick="shareText('missing')">❌ Missing list</button>
      </div>
      <div class="card"><div style="color:#666;font-size:10px;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">Stats</div>
        <div class="stat-grid">
          <div class="stat-box"><div class="stat-num" style="color:#fff">${stats.owned}</div><div style="color:var(--muted);font-size:11px">Owned</div></div>
          <div class="stat-box"><div class="stat-num" style="color:var(--orange)">${stats.missing}</div><div style="color:var(--muted);font-size:11px">Missing</div></div>
          <div class="stat-box"><div class="stat-num" style="color:var(--teal)">${stats.dupes}</div><div style="color:var(--muted);font-size:11px">Duplicates</div></div>
          <div class="stat-box"><div class="stat-num" style="color:var(--gold)">${stats.pct}%</div><div style="color:var(--muted);font-size:11px">Complete</div></div>
        </div>
      </div>
      <div class="card" style="border-color:#ff444425"><div style="color:#ff6666;font-size:10px;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">Danger zone</div>
        <button class="action-btn" style="background:#ff444415;color:#ff6666;border-color:#ff444430;margin-top:0"
          onclick="if(confirm('Delete ALL stickers?')){state.stickers={};saveLocal();saveToFirestore();flash('Reset!');render()}">🗑️ Reset collection</button>
      </div>`;
  }

  // ASSEMBLE
  app.innerHTML=`
    ${state.toast?`<div class="toast">${esc(state.toast)}</div>`:""}
    <div class="hdr"><div><h1 class="hdr-title">PANINI 2026</h1><div style="font-size:11px"><span style="color:var(--gold)">${esc(state.profile.name)}</span>${state.profile.room?`<span style="color:var(--teal);margin-left:8px">🏠 ${esc(state.profile.room)}</span>`:""}</div></div>
    <div style="text-align:right"><div class="hdr-pct">${stats.pct}<span style="font-size:11px;color:var(--muted)">%</span></div><div style="font-size:10px;color:#666">${stats.owned}/${TOTAL}</div></div></div>
    <div class="prog"><div class="prog-fill" style="width:${stats.pct}%"></div></div>
    <div class="add-row"><input class="add-in" id="quick-input" placeholder="Add: MEX5, BRA14, FWC3…" onkeydown="if(event.key==='Enter')quickAdd()"><button class="add-btn" onclick="quickAdd()">Add</button></div>
    ${state.justAdded.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;padding:2px 16px 6px;align-items:center"><span style="color:var(--teal);font-size:12px">✓</span>${state.justAdded.map(c=>{const tc=teamForCode(c);const t=tc?TEAMS[tc]:null;return`<span style="font-size:11px;font-weight:700;font-family:'Oswald',sans-serif;padding:2px 6px;border-radius:5px;border:1px solid ${t?t.color+"66":"#D4AF3766"};color:${t?t.color:"var(--gold)"}">${c}</span>`}).join("")}</div>`:""}
    <div class="nav">${[["feed","🔔","Trades",totalAlerts],["album","📋","Album",0],["room","👥","Room",0],["more","⚙️","More",0]].map(([k,ico,label,badge])=>
      `<button class="nav-btn${state.page===k?" on":""}" onclick="state.page='${k}';state.selGroup=null;state.selTeam=null;render()"><span class="nav-ico">${ico}${badge>0&&k==="feed"?`<span class="nav-badge">${badge>99?"99+":badge}</span>`:""}</span><span>${label}</span></button>`).join("")}</div>
    <div class="body">${content}</div>`;
}

// BOOT
loadLocal();
try{if(localStorage.getItem('pn-auth')==='1')state.authed=true}catch{}
state.loading=false;render();
if(state.profile?.roomKey)listenToRoom();
</script>
</body>
</html>
